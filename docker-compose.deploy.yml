name: linkbot-core

services:
  openclaw-gateway:
    image: ${OPENCLAW_IMAGE:-linkbot-core:local}
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ${OPENCLAW_RUNTIME_ENV_FILE:-/opt/linktrend/runtime/linkbot-core/prod.env.runtime}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      TZ: ${OPENCLAW_TZ:-Asia/Taipei}
      OPENCLAW_STATE_DIR: ${OPENCLAW_STATE_DIR:-/data/.openclaw}
      OPENCLAW_CONFIG_DIR: ${OPENCLAW_CONFIG_DIR:-/data/.openclaw}
      OPENCLAW_WORKSPACE_DIR: ${OPENCLAW_WORKSPACE_DIR:-/data/workspace}
    command:
      [
        "node",
        "dist/index.js",
        "gateway",
        "--bind",
        "${OPENCLAW_GATEWAY_BIND:-lan}",
        "--port",
        "18789"
      ]
    init: true
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - ${LINKBOT_STATE_CONFIG_DIR:-/opt/linktrend/data/linkbot-core/state/config}:/data/.openclaw
      - ${LINKBOT_STATE_WORKSPACE_DIR:-/opt/linktrend/data/linkbot-core/state/workspace}:/data/workspace
      - ./deploy/prod/openclaw.json:/data/.openclaw/openclaw.json:ro
    labels:
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_DOCKER_NETWORK:-linktrend-network}
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-linkbot}.rule=Host(`${TRAEFIK_HOST:-linkbot.linktrend.internal}`)
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-linkbot}.entrypoints=${TRAEFIK_ENTRYPOINTS:-websecure}
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-linkbot}.tls=true
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-linkbot}.service=${TRAEFIK_ROUTER_NAME:-linkbot}
      - traefik.http.routers.${TRAEFIK_ROUTER_NAME:-linkbot}.priority=20
      - traefik.http.services.${TRAEFIK_ROUTER_NAME:-linkbot}.loadbalancer.server.port=18789
    networks:
      - linktrend-network

networks:
  linktrend-network:
    external: true
