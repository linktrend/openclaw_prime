# Copy to: .github/workflows/linkdev-dispatch.yml
# LiNKdev dispatch v2 — GitHub Actions + Cursor Cloud Agents API.
# Canonical doc: LiNKdev/factory/docs/DISPATCH.md

name: LiNKdev dispatch

on:
  issues:
    types: [labeled]
  pull_request:
    types: [labeled, closed]
  push:
    branches: [development]
    paths: ['LiNKdev/factory/STATE.md']
  repository_dispatch:
    types: [linkdev-planner-complete]
  workflow_dispatch:
    inputs:
      role:
        description: Factory role to dispatch
        required: true
        type: choice
        options:
          - orchestrator
          - executor
          - reviewer
          - integrator

jobs:
  dispatch-executor:
    if: >-
      github.event_name == 'issues' &&
      (github.event.label.name == 'linkdev:ready' || github.event.label.name == 'runtime:cursor')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify issue labels (AND)
        id: labels
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/check-labels-for-dispatch.sh
          LiNKdev/factory/scripts/check-labels-for-dispatch.sh issue-has-all \
            "${{ github.repository }}" "${{ github.event.issue.number }}" \
            linkdev:ready runtime:cursor

      - name: Dispatch Cursor executor
        id: dispatch
        if: steps.labels.outcome == 'success'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role executor \
            --repo "${GITHUB_REPOSITORY}" \
            --issue "${{ github.event.issue.number }}"

      - name: Post dispatch status on issue
        if: steps.labels.outcome == 'success' && steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh
          LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh \
            --role executor \
            --repo "${{ github.repository }}" \
            --issue "${{ github.event.issue.number }}" \
            --agent-id "${{ steps.dispatch.outputs.agent_id }}" \
            --agent-url "${{ steps.dispatch.outputs.agent_url }}" \
            --run-status "${{ steps.dispatch.outputs.run_status }}"

  dispatch-reviewer:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'linkdev:review-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify PR label
        run: |
          chmod +x LiNKdev/factory/scripts/check-labels-for-dispatch.sh
          LiNKdev/factory/scripts/check-labels-for-dispatch.sh pr-has \
            "${{ github.repository }}" "${{ github.event.pull_request.number }}" \
            linkdev:review-ready

      - name: Dispatch Cursor reviewer
        id: dispatch
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role reviewer \
            --repo "${GITHUB_REPOSITORY}" \
            --pr "${{ github.event.pull_request.number }}"

      - name: Post dispatch status on PR
        if: steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh
          LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh \
            --role reviewer \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --agent-id "${{ steps.dispatch.outputs.agent_id }}" \
            --agent-url "${{ steps.dispatch.outputs.agent_url }}" \
            --run-status "${{ steps.dispatch.outputs.run_status }}"

  dispatch-integrator:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'labeled' &&
      github.event.label.name == 'linkdev:merge-ready'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify PR label
        run: |
          chmod +x LiNKdev/factory/scripts/check-labels-for-dispatch.sh
          LiNKdev/factory/scripts/check-labels-for-dispatch.sh pr-has \
            "${{ github.repository }}" "${{ github.event.pull_request.number }}" \
            linkdev:merge-ready

      - name: Dispatch Cursor integrator
        id: dispatch
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role integrator \
            --repo "${GITHUB_REPOSITORY}" \
            --pr "${{ github.event.pull_request.number }}"

      - name: Post dispatch status on PR
        if: steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh
          LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh \
            --role integrator \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --agent-id "${{ steps.dispatch.outputs.agent_id }}" \
            --agent-url "${{ steps.dispatch.outputs.agent_url }}" \
            --run-status "${{ steps.dispatch.outputs.run_status }}"

  dispatch-orchestrator-merge:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify merge to development
        id: merged
        continue-on-error: true
        run: |
          chmod +x LiNKdev/factory/scripts/check-labels-for-dispatch.sh
          LiNKdev/factory/scripts/check-labels-for-dispatch.sh pr-merged-to \
            "${{ github.repository }}" "${{ github.event.pull_request.number }}" \
            development

      - name: Dispatch Cursor orchestrator
        id: dispatch
        if: steps.merged.outcome == 'success'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role orchestrator \
            --repo "${GITHUB_REPOSITORY}" \
            --pr "${{ github.event.pull_request.number }}"

      - name: Post dispatch status on PR
        if: steps.merged.outcome == 'success' && steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh
          LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh \
            --role orchestrator \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --agent-id "${{ steps.dispatch.outputs.agent_id }}" \
            --agent-url "${{ steps.dispatch.outputs.agent_url }}" \
            --run-status "${{ steps.dispatch.outputs.run_status }}"

  dispatch-orchestrator-manual:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Dispatch selected role
        id: dispatch
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          DISPATCH_ROLE: ${{ github.event.inputs.role }}
        run: |
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role "${DISPATCH_ROLE}" \
            --repo "${GITHUB_REPOSITORY}"

      - name: Post dispatch status (tracking issue)
        if: steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh
          LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh \
            --role "${{ github.event.inputs.role }}" \
            --repo "${{ github.repository }}" \
            --agent-id "${{ steps.dispatch.outputs.agent_id }}" \
            --agent-url "${{ steps.dispatch.outputs.agent_url }}" \
            --run-status "${{ steps.dispatch.outputs.run_status }}"

  dispatch-orchestrator-state:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/development') ||
      github.event_name == 'repository_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    concurrency:
      group: linkdev-orchestrator-state-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
        with:
          ref: development

      - name: Verify STATE requests orchestrator
        id: state
        continue-on-error: true
        run: |
          chmod +x LiNKdev/factory/scripts/check-labels-for-dispatch.sh
          PROGRAM_ID=""
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            PROGRAM_ID="${{ github.event.client_payload.program_id }}"
          fi
          if [[ -n "$PROGRAM_ID" ]]; then
            LiNKdev/factory/scripts/check-labels-for-dispatch.sh state-requests-orchestrator \
              LiNKdev/factory/STATE.md "$PROGRAM_ID"
          else
            LiNKdev/factory/scripts/check-labels-for-dispatch.sh state-requests-orchestrator \
              LiNKdev/factory/STATE.md
          fi

      - name: Dispatch Cursor orchestrator (planner handoff)
        id: dispatch
        if: steps.state.outcome == 'success'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role orchestrator \
            --repo "${GITHUB_REPOSITORY}"

      - name: Post dispatch status (tracking issue)
        if: steps.state.outcome == 'success' && steps.dispatch.outcome == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh
          LiNKdev/factory/scripts/post-linkdev-dispatch-status.sh \
            --role orchestrator \
            --repo "${{ github.repository }}" \
            --agent-id "${{ steps.dispatch.outputs.agent_id }}" \
            --agent-url "${{ steps.dispatch.outputs.agent_url }}" \
            --run-status "${{ steps.dispatch.outputs.run_status }}"
