# Copy to: .github/workflows/linkdev-agent-watch.yml
# Poll Cursor agents and post running/finished/failed updates on GitHub issues/PRs.

name: LiNKdev agent watch

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  watch:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Sync agent status to GitHub
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ -z "${CURSOR_API_KEY:-}" ]]; then
            echo "CURSOR_API_KEY not set — skip watch"
            exit 0
          fi
          node LiNKdev/factory/scripts/sync-agent-watch.mjs --repo "${GITHUB_REPOSITORY}"
