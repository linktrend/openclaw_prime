# Copy to: .github/workflows/linkdev-planner-bootstrap.yml
# Privileged Planner → development merge + Orchestrator dispatch (cloud agents push marker only).
# Canonical doc: LiNKdev/factory/docs/DISPATCH.md

name: LiNKdev planner bootstrap

on:
  push:
    paths:
      - '.linkdev/handoff/planner-complete.json'
  workflow_dispatch:
    inputs:
      program_id:
        description: Program id (optional; defaults from marker on triggering ref)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: linkdev-planner-bootstrap-${{ github.repository }}
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    env:
      INTEGRATION_BRANCH: development
      BOOTSTRAP_MARKER: '[linkdev-bootstrap]'
      HANDOFF_PATH: .linkdev/handoff/planner-complete.json
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read handoff marker
        id: handoff
        run: |
          set -euo pipefail
          if [[ ! -f "$HANDOFF_PATH" ]]; then
            echo "No handoff marker at $HANDOFF_PATH — skip"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          python3 LiNKdev/factory/scripts/read-planner-handoff-marker.py "$HANDOFF_PATH" >> "$GITHUB_ENV"
          if [[ -n "${{ github.event.inputs.program_id }}" ]]; then
            echo "PROGRAM_ID=${{ github.event.inputs.program_id }}" >> "$GITHUB_ENV"
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - name: Validate STATE and intent (G2)
        if: steps.handoff.outputs.skip != 'true'
        run: |
          set -euo pipefail
          chmod +x LiNKdev/factory/scripts/validate-intent.sh LiNKdev/factory/scripts/verify.sh
          LiNKdev/factory/scripts/validate-intent.sh "$PROGRAM_ID"
          LiNKdev/factory/scripts/verify.sh

      - name: Ensure bootstrap PR targets development
        if: steps.handoff.outputs.skip != 'true' && env.HANDOFF_BRANCH != env.INTEGRATION_BRANCH
        id: pr
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          TITLE="Program setup: ${PROGRAM_ID} (${BOOTSTRAP_MARKER})"
          {
            printf '%s\n\n' "$BOOTSTRAP_MARKER"
            printf 'Planner G2 PASS — bootstrap program merge to `%s`.\n' "$INTEGRATION_BRANCH"
            printf 'Privileged handoff via GitHub Actions (`linkdev-planner-bootstrap`).\n\n'
            printf 'Program: `%s`\n' "$PROGRAM_ID"
            printf 'Branch: `%s`\n' "$HANDOFF_BRANCH"
            printf 'SHA: `%s`\n' "$HANDOFF_SHA"
          } > /tmp/linkdev-bootstrap-pr-body.md
          BODY="$(cat /tmp/linkdev-bootstrap-pr-body.md)"

          PR="${PR_NUMBER:-}"
          if [[ -n "$PR" ]]; then
            BASE="$(gh pr view "$PR" --repo "$REPO" --json baseRefName -q .baseRefName)"
            if [[ "$BASE" != "$INTEGRATION_BRANCH" ]]; then
              echo "Retargeting PR #${PR} base ${BASE} → ${INTEGRATION_BRANCH}"
              gh api "repos/${REPO}/pulls/${PR}" -X PATCH -f base="$INTEGRATION_BRANCH" >/dev/null
            fi
          else
            PR="$(gh pr list --repo "$REPO" --head "$HANDOFF_BRANCH" --state open --json number -q '.[0].number' 2>/dev/null || true)"
            if [[ -z "$PR" || "$PR" == "null" ]]; then
              echo "Opening PR to ${INTEGRATION_BRANCH}"
              PR="$(gh pr create --repo "$REPO" --base "$INTEGRATION_BRANCH" --head "$HANDOFF_BRANCH" --title "$TITLE" --body "$BODY" --json number -q .number)"
            else
              BASE="$(gh pr view "$PR" --repo "$REPO" --json baseRefName -q .baseRefName)"
              if [[ "$BASE" != "$INTEGRATION_BRANCH" ]]; then
                gh api "repos/${REPO}/pulls/${PR}" -X PATCH -f base="$INTEGRATION_BRANCH" >/dev/null
              fi
              gh pr edit "$PR" --repo "$REPO" --title "$TITLE" --body "$BODY" >/dev/null
            fi
          fi

          gh pr edit "$PR" --repo "$REPO" --add-label "linkdev:bootstrap-merge" --add-label "linkdev:merge-ready" 2>/dev/null || \
            gh pr edit "$PR" --repo "$REPO" --add-label "linkdev:merge-ready" >/dev/null || true

          echo "pr_number=${PR}" >> "$GITHUB_OUTPUT"

      - name: Merge bootstrap PR
        if: steps.handoff.outputs.skip != 'true' && env.HANDOFF_BRANCH != env.INTEGRATION_BRANCH
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          PR="${{ steps.pr.outputs.pr_number }}"
          echo "Waiting for PR #${PR} checks (up to 25m)"
          for _ in $(seq 1 50); do
            read -r STATE MERGEABLE < <(gh pr view "$PR" --repo "$REPO" --json mergeStateStatus,mergeable -q '[.mergeStateStatus,.mergeable]|@tsv')
            if [[ "$STATE" == "CLEAN" && "$MERGEABLE" == "MERGEABLE" ]]; then
              break
            fi
            if [[ "$STATE" == "BLOCKED" && "$MERGEABLE" != "MERGEABLE" ]]; then
              sleep 30
              continue
            fi
            sleep 30
          done

          if gh pr merge "$PR" --repo "$REPO" --merge --delete-branch=false >/dev/null 2>&1; then
            echo "Merged PR #${PR}"
          elif gh pr merge "$PR" --repo "$REPO" --merge --admin --delete-branch=false >/dev/null 2>&1; then
            echo "Merged PR #${PR} with admin bypass (bootstrap: linkdev-guard-only failures)"
          else
            echo "Merge failed for PR #${PR}" >&2
            exit 1
          fi

      - name: Dispatch orchestrator
        if: steps.handoff.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          if gh workflow run "LiNKdev dispatch" --repo "$REPO" --ref "$INTEGRATION_BRANCH" -f role=orchestrator >/dev/null 2>&1; then
            echo "Queued LiNKdev dispatch (orchestrator) on ${INTEGRATION_BRANCH}"
            exit 0
          fi
          if [[ -z "${CURSOR_API_KEY:-}" ]]; then
            echo "workflow_dispatch failed and CURSOR_API_KEY unset" >&2
            exit 1
          fi
          node LiNKdev/factory/scripts/dispatch-cursor-agent.mjs \
            --role orchestrator \
            --repo "$REPO"

      - name: Clear handoff marker on development
        if: steps.handoff.outputs.skip != 'true' && success()
        run: |
          set -euo pipefail
          git fetch origin "$INTEGRATION_BRANCH"
          git checkout "$INTEGRATION_BRANCH"
          git pull origin "$INTEGRATION_BRANCH"
          PROCESSED=".linkdev/handoff/planner-complete.processed.json"
          if [[ ! -f "$HANDOFF_PATH" ]]; then
            echo "Marker already cleared on ${INTEGRATION_BRANCH}"
            exit 0
          fi
          mv "$HANDOFF_PATH" "$PROCESSED"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$PROCESSED"
          git commit -m "chore(linkdev): clear planner handoff marker (${PROGRAM_ID})"
          git push origin "$INTEGRATION_BRANCH"
