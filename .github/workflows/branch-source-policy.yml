name: Branch Source Policy

# LiNKdev issue/* may target development (LiNKdev/factory/SPEC.md §8).

on:
  pull_request:
    branches: [main, staging, development]

jobs:
  branch-source-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce promotion branch flow
        env:
          BASE_BRANCH: ${{ github.base_ref }}
          HEAD_BRANCH: ${{ github.head_ref }}
        run: |
          set -euo pipefail

          echo "PR source: ${HEAD_BRANCH}"
          echo "PR target: ${BASE_BRANCH}"

          case "${BASE_BRANCH}" in
            main)
              if [ "${HEAD_BRANCH}" != "staging" ]; then
                echo "Only staging may be merged into main."
                exit 1
              fi
              ;;
            staging)
              if [ "${HEAD_BRANCH}" != "development" ]; then
                echo "Only development may be merged into staging."
                exit 1
              fi
              ;;
            development)
              case "${HEAD_BRANCH}" in
                issue/*|dev/*|feature/*|fix/*|chore/*|codex/*|cursor/*|antigravity/*|dependabot/*)
                  ;;
                *)
                  echo "Only short-lived work branches may be merged into development."
                  echo "Allowed prefixes: issue/, dev/, feature/, fix/, chore/, codex/, cursor/, antigravity/, dependabot/."
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "Unhandled base branch: ${BASE_BRANCH}"
              exit 1
              ;;
          esac
